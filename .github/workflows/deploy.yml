name: Build, Push & Deploy

on:
  push:
    branches:
      - staging
      - release

env:
  IMAGE_NAME: ghcr.io/naveenyadav9515/onespaceservices

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1.5 Set environment variables based on branch
      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref_name }}" == "release" ]; then
            echo "IMAGE_TAG=release" >> $GITHUB_ENV
            echo "RENDER_HOOK=https://api.render.com/deploy/srv-d97kmc7avr4c73d3ki2g?key=pVLz4jhiF3M" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
            echo "RENDER_HOOK=https://api.render.com/deploy/srv-d973bhho3t8c739ua570?key=C9a74GZBvf4" >> $GITHUB_ENV
          fi

      # 2. Set up Docker Buildx for efficient builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2.5 Automated Version Bump
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Automatic Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Determine version bump based on Conventional Commits
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          
          if echo "$COMMIT_MSG" | grep -qE "^[a-zA-Z]+!:" || echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE"; then
            echo "Major bump requested"
            npm version major -m "chore: bump version to %s [skip ci]" --force
          elif echo "$COMMIT_MSG" | grep -qE "^feat:"; then
            echo "Minor bump requested"
            npm version minor -m "chore: bump version to %s [skip ci]" --force
          else
            echo "Defaulting to patch bump"
            npm version patch -m "chore: bump version to %s [skip ci]" --force
          fi
          
          git push origin HEAD:${{ github.ref_name }} --tags

      # 3. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: naveenyadav9515
          password: ${{ secrets.GHCR_PAT }}

      # 4. Build and push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Trigger fresh deployment on Render
      - name: Deploy to Render
        run: |
          if [ -z "${{ env.RENDER_HOOK }}" ]; then
            echo "Warning: RENDER_HOOK is empty. Skipping Render deployment trigger."
          else
            curl -s "${{ env.RENDER_HOOK }}"
          fi
